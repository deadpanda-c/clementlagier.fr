name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  PROD_HOST: $HOST
  PROD_USERNAME: $USERNAME

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -t rsa ${{ env.PROD_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H -t rsa github.com >> ~/.ssh/known_hosts

      - name: Deploy to Production Server
        run: |
          ssh -i ~/.ssh/id_rsa ${{ env.PROD_USERNAME }}@${{ env.PROD_HOST }} "cd project/${{ env.PROD_HOST }} && git pull origin main"
